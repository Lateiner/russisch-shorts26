<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Richtig oder Falsch?</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #dcdde1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            text-align: center;
            color: var(--primary-color);
        }

        .progress-text {
            text-align: center;
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        /* Quiz-Box */
        .quiz-card {
            background-color: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* Große, touchfreundliche Buttons */
        .choice-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-choice {
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            background-color: white;
            transition: all 0.2s ease;
            color: var(--text-color);
        }

        .btn-true {
            border-color: #2ecc71;
            color: #27ae60;
        }

        .btn-false {
            border-color: #e74c3c;
            color: #c0392b;
        }

        @media (hover: hover) {
            .btn-true:hover:not(:disabled) {
                background-color: #e8f8f5;
                transform: translateY(-2px);
            }
            .btn-false:hover:not(:disabled) {
                background-color: #fdedec;
                transform: translateY(-2px);
            }
        }

        .btn-choice:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Ausgewählte Zustände */
        .btn-choice.correct-selected {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color) !important;
        }

        .btn-choice.wrong-selected {
            background-color: var(--error-color) !important;
            color: white !important;
            border-color: var(--error-color) !important;
        }

        /* Feedback-Bereich */
        .feedback-area {
            text-align: center;
            min-height: 80px;
            margin-bottom: 25px;
            padding: 10px;
        }

        .feedback-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .feedback-explanation {
            font-size: 0.95rem;
            color: #57606f;
        }

        /* Navigation */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-nav {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-next {
            background-color: var(--primary-color);
            color: white;
            display: none;
        }

        .btn-next:hover {
            background-color: #357abd;
        }

        .btn-reset {
            background-color: #7f8c8d;
            color: white;
        }

        .btn-reset:hover {
            background-color: #6a7778;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Richtig oder Falsch?</h1>
    <div class="progress-text" id="progress">Frage 1 von 6</div>

    <div class="quiz-card" id="question-text">
        Frage wird geladen...
    </div>

    <div class="choice-container">
        <button class="btn-choice btn-true" id="btn-true" onclick="handleAnswer(true)">Richtig</button>
        <button class="btn-choice btn-false" id="btn-false" onclick="handleAnswer(false)">Falsch</button>
    </div>

    <div class="feedback-area" id="feedback-container">
        <div class="feedback-title" id="feedback-title"></div>
        <div class="feedback-explanation" id="feedback-explanation"></div>
    </div>

    <div class="controls">
        <button class="btn-nav btn-next" id="next-btn" onclick="nextQuestion()">Nächste Frage</button>
        <button class="btn-nav btn-reset" onclick="restartQuiz()">Neustart</button>
    </div>
</div>

<script>
    const quizData = [
        {
            question: "Bedeutet das Wort куча wörtlich „Haufen“?",
            expected: true,
            explanation: "Genau! Wörtlich bedeutet es Haufen, wird im Alltag aber exakt wie das deutsche „ein Haufen Arbeit“ für eine große Menge verwendet."
        },
        {
            question: "Ist куча ein sehr formelles Wort, das man in offiziellen Briefen nutzt?",
            expected: false,
            explanation: "Richtig gedacht (also Falsch)! куча ist ein umgangssprachliches Wort für die Alltagssprache. Im offiziellen, neutralen Kontext nutzt man много."
        },
        {
            question: "Folgt nach dem Wort куча immer der Akkusativ?",
            expected: false,
            explanation: "Nein, das ist falsch! Nach куча fordert die Grammatik immer den Genitiv (Wer oder was? Ein Haufen *wessen?*)."
        },
        {
            question: "Ist der Ausdruck „куча работы“ grammatikalisch völlig korrekt?",
            expected: true,
            explanation: "Ja! работы ist der Genitiv Singular von работа. Die Kombination ist im Alltag absolut gebräuchlich."
        },
        {
            question: "Kann man das Wort куча nur für Dinge benutzen, die man nicht zählen kann (wie Arbeit oder Zeit)?",
            expected: false,
            explanation: "Falsch! Man kann es sowohl für unzählbare Dinge (куча времени - ein Haufen Zeit) als auch für zählbare Dinge (куча книг - ein Haufen Bücher) im Genitiv Plural verwenden."
        },
        {
            question: "Ersetzt das Wort куча in der gesprochenen Sprache oft das neutrale Wort много?",
            expected: true,
            explanation: "Richtig! Statt ständig das neutrale много (viel) zu wiederholen, greifen Muttersprachler im Gespräch sehr gern zu куча."
        }
    ];

    let currentQuestionIndex = 0;

    function initQuestion() {
        const currentData = quizData[currentQuestionIndex];
        
        // UI-Reset
        document.getElementById('progress').textContent = `Frage ${currentQuestionIndex + 1} von ${quizData.length}`;
        document.getElementById('question-text').textContent = currentData.question;
        
        const btnTrue = document.getElementById('btn-true');
        const btnFalse = document.getElementById('btn-false');
        
        btnTrue.disabled = false;
        btnFalse.disabled = false;
        btnTrue.className = "btn-choice btn-true";
        btnFalse.className = "btn-choice btn-false";

        document.getElementById('feedback-title').textContent = "";
        document.getElementById('feedback-explanation').textContent = "";
        document.getElementById('next-btn').style.display = "none";
    }

    function handleAnswer(selectedAnswer) {
        const currentData = quizData[currentQuestionIndex];
        const btnTrue = document.getElementById('btn-true');
        const btnFalse = document.getElementById('btn-false');
        
        btnTrue.disabled = true;
        btnFalse.disabled = true;

        const isCorrect = (selectedAnswer === currentData.expected);
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackExplanation = document.getElementById('feedback-explanation');

        // Visuelle Markierung der Buttons
        if (selectedAnswer === true) {
            btnTrue.classList.add(isCorrect ? 'correct-selected' : 'wrong-selected');
        } else {
            btnFalse.classList.add(isCorrect ? 'correct-selected' : 'wrong-selected');
        }

        // Feedback-Text ausgeben
        if (isCorrect) {
            feedbackTitle.textContent = "Stimmt genau! 🎉";
            feedbackTitle.style.color = "var(--success-color)";
        } else {
            feedbackTitle.textContent = "Nicht ganz richtig. 😕";
            feedbackTitle.style.color = "var(--error-color)";
        }
        
        feedbackExplanation.textContent = currentData.explanation;

        // Navigations-Button anzeigen (falls noch Fragen übrig sind)
        if (currentQuestionIndex < quizData.length - 1) {
            document.getElementById('next-btn').style.display = "block";
        } else {
            feedbackTitle.textContent += " Quiz beendet! 🌟";
        }
    }

    function nextQuestion() {
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            initQuestion();
        }
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        initQuestion();
    }

    // Beim Laden starten
    window.onload = initQuestion;
</script>

</body>
</html>
